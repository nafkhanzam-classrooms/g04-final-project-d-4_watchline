services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: watchline
      POSTGRES_PASSWORD: watchline
      POSTGRES_DB: watchline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchline"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db

volumes:
  pgdata:
